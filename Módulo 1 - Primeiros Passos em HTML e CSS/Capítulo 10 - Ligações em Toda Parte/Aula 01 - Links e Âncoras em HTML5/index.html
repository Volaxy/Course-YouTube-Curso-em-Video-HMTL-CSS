<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Links</title>
</head>
<body>
    <h1>Criando Vários Tipos de Links</h1>

    <h2>Link Interno</h2>                                                   <!-- Este atributo informa qual o idioma principal do site que a pessoa está visitando -->
    <p>Eu posso acessar outro site sobrepondo a tela da página atual <a href="https://gustavoguanabara.github.io" hreflang="pt-br">desse jeito</a></p>

    <h2>Links Externos</h2>                                                             <!-- Este parâmetro indica que o link direcionará para um site que não faz parte do atual -->
    <p>Além de criar links internos, eu também posso fazer links que levam para outros sites, como o <a href="https://youtube.com" target="_blank" rel="external">YouTube</a></p>
</body>
</html>
