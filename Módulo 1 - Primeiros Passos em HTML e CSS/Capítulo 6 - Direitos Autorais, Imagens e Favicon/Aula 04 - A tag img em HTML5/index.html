<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag img em HTML5</title>
</head>
<body>
    <h1>Testando Tamanho de Imagens</h1>
    <p>Primeiro, imagens que estão na mesma pasta</p>
    <img src="html5-200.png" alt="Logo do HTML5">

    <p>Podemos também carregar imagens que estão em sub-pastas</p>
    <img src="imagens/css3-200.png" alt="Logo do CSS3">

    <p>Também podemos carregar imagens externas</p>
    <img src="https://cdn.pixabay.com/photo/2015/04/23/17/41/javascript-736400_960_720.png" alt="Logo do JavaScript">

</html>
