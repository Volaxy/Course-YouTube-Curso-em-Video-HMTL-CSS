<!-- 
    # Abreviação para um código HTML básico #

    1 - Digite "!";
    2 - Aperte ENTER para confirmar e o código base será criado automáticamente para você

    #
        <!DOCTYPE html> = Indica para o navegador que este é um documento em HTML5
        <html lang="en"> = Indica o idioma que a página terá
        <head> = Parte de configurações do site
            <meta charset="UTF-8"> = Padrão de codificação de caracteres que aceita acentuação
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0"> = "name='viewport'" - Indica que o site ocupará 100% da tela disponível dada pelo navegador
            <title>Document</title> = Título do site
        </head>
        <body> = Parte do conteúdo do site
            
        </body>
        </html>
    #
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro exercício</title>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <hr>
    <p>Esse é o meu primeiro documento HTML! Estou muito feliz!</p>
    <p>Este é um momento único! Estou criando um site!</p>
</body>
</html>
